name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Publish built site to repository root
        run: |
          cp dist/index.dev.html index.html
          rm -rf assets
          cp -r dist/assets assets
          cp dist/.nojekyll .nojekyll 2>/dev/null || cp public/.nojekyll .nojekyll

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/ .nojekyll
          git diff --staged --quiet || git commit -m "chore: publicar build de GitHub Pages [skip ci]"
          git push
